# =============================================================================
# ETL Monitor Dashboard — Kubernetes Deployment
# =============================================================================
# React frontend served via nginx, proxying /api to the backend service.
# 2 replicas per design doc.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl-monitor-dashboard
  namespace: etl-monitor
  labels:
    app: etl-monitor-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etl-monitor-dashboard
  template:
    metadata:
      labels:
        app: etl-monitor-dashboard
    spec:
      nodeSelector:
        nodepool: app
      containers:
        - name: dashboard
          image: acrsmithfarmsproduction.azurecr.io/etl-monitor-dashboard:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5
            failureThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: etl-monitor-dashboard
  namespace: etl-monitor
spec:
  selector:
    app: etl-monitor-dashboard
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: etl-monitor-dashboard-pdb
  namespace: etl-monitor
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: etl-monitor-dashboard
